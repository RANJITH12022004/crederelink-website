<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — Crederelink Fintech</title>
  <meta name="robots" content="noindex">
  <!-- Restore theme before paint -->
  <script>(function(){try{var t=localStorage.getItem("cl-theme");document.documentElement.setAttribute("data-theme",t||"dark");}catch(e){}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <style>
    :root {
      --bg:    #060D14;
      --bg-2:  #0C1B28;
      --text-1:#E6EFF8;
      --text-2:#7A9BB5;
      --gold:  #C9A553;
      --border:rgba(230,239,248,0.08);
    }
    [data-theme="light"] {
      --bg:    #F4F1EB;
      --bg-2:  #fff;
      --text-1:#062949;
      --text-2:#5A7080;
      --gold:  #9A7520;
      --border:rgba(6,41,73,0.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-2);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
      -webkit-font-smoothing: antialiased;
      transition: background 0.4s, color 0.4s;
    }
    .mark {
      width: 88px; height: 88px;
      object-fit: contain;
      opacity: 0.7;
      margin-bottom: 2.5rem;
    }
    .code {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 500;
      line-height: 1;
      color: var(--text-1);
      letter-spacing: -0.04em;
      margin-bottom: 1.5rem;
    }
    .code span { color: var(--gold); }
    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      font-weight: 500;
      color: var(--text-1);
      margin-bottom: 0.9rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 0.98rem;
      line-height: 1.72;
      max-width: 42em;
      margin-bottom: 2.5rem;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px;
      font: 600 0.9rem "DM Sans", sans-serif;
      background: linear-gradient(135deg, #C9A553, #F0C96E);
      color: #060D14;
      border-radius: 6px;
      text-decoration: none;
      transition: transform 0.22s, box-shadow 0.28s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(201,165,83,.22), 0 4px 14px rgba(0,0,0,.4);
    }
    .divider {
      width: 100%; max-width: 380px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border) 30%, rgba(201,165,83,.25) 50%, var(--border) 70%, transparent);
      margin: 2.8rem 0;
    }
    .links { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; }
    .links a {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-2);
      text-decoration: none;
      transition: color 0.2s;
    }
    .links a:hover { color: var(--gold); }
  </style>
</head>
<body>
  <img src="assets/logo-mark.png" alt="Crederelink Fintech" class="mark" width="88" height="88">
  <p class="code">4<span>0</span>4</p>
  <h1>Page not found</h1>
  <p>The page you're looking for has moved or doesn't exist. Let's get you back on track.</p>
  <a href="index.html" class="btn">Back to homepage</a>
  <div class="divider"></div>
  <nav class="links" aria-label="Quick navigation">
    <a href="index.html#services">Services</a>
    <a href="index.html#features">Features</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact">Contact</a>
  </nav>
</body>
</html>
